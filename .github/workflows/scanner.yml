name: SP500 Momentum Scanner

on:
  workflow_dispatch:

  schedule:
    # 7 AM Singapore = 11 PM UTC previous day
    - cron: '0 23 * * *'

    # 5 PM Singapore = 9 AM UTC
    - cron: '0 9 * * *'

    # 7 PM Singapore = 11 AM UTC
    - cron: '0 11 * * *'

    # 9 PM Singapore = 1 PM UTC
    - cron: '0 13 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US Scanner 1
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python us_scanner1.py