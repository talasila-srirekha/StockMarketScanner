name: NIFTY Momentum Scanner

on:
  workflow_dispatch:

    
jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run India Scanner with RSA
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.INDIAN_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.INDIAN_TELEGRAM_CHAT_ID }}
        run: |
          python india_scannner_with_RSI.py