name: US S&P 500 220 DMA Scanner

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US 500 220 DMA Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.DMA_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.DMA_TELEGRAM_CHAT_ID }}
        run: |
          python 220_DMA_Screener/US_500_Scanner.py